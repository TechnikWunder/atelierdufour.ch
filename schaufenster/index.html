<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schaufenster</title>
    <style>
        /* Navigation */
        .nav-modern {
            background: #333;
            color: #fff;
            overflow: hidden;
            border-radius: 14px;
            margin-bottom: 24px;
        }

        .nav-modern ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
        }

        .nav-modern a {
            color: #fff;
            text-decoration: none;
            padding: 12px 15px;
            display: block;
            line-height: normal;
            text-align: center;
            flex: 1 1 auto;
            white-space: nowrap;
        }

        .nav-modern a:hover {
            background: #666;
            text-decoration: none;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        .header-container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-bottom: 50px;
        }

        #last-img {
            width: 500px;
            height: auto;
            display: block;
            min-height: 100px; 
        }

        #dynamic-text-container {
            flex: 1;
        }

        #main-title {
            margin-top: 0;
            font-size: 2rem;
        }

        #main-description {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #333;
        }

        #object {
            display: flex;
            flex-wrap: wrap;
            list-style: none;
            padding: 0;
            gap: 20px;
        }

</head>
<body>

    <nav class="nav-modern">
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/tonerde">Tonerde</a></li>

            <li><a href="/ueber-mich">Über mich</a></li>
            <li><a href="/kontakt">Kontakt</a></li>
        </ul>
    </nav>

    <div class="header-container">
        <img id="last-img" src="" alt="">

        <div id="dynamic-text-container">
            <h1 id="main-title"></h1>
            <p id="main-description"></p>
        </div>
    </div>

    <ul id="object"></ul>

    <script src="index.js"></script>
</body>
</html>
