<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Richtet den Inhalt (Button) links aus */
        }

        /* Der umrandete Zurück-Button */
        .back-button {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            margin-bottom: 20px;
            text-decoration: none;
            color: #555;
            background-color: white;
            border: 1px solid #ccc; /* Die Umrandung */
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .back-button:hover {
            background-color: #f0f0f0;
            border-color: #999;
            color: #000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card {
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .card h2 {
            margin: 0 0 15px 0;
            font-size: 2.2rem;
            font-weight: 600;
        }

        .card p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #666;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://ateliuerdufour.ch/schaufenster" class="back-button">
            ← Zurück
        </a>

        <div class="card">
            <img id="img" src="#" alt="Beispielbild">
            <h2 id="card-title">Titel</h2>
            <p id="card-description">Beschreibung</p>
        </div>
    </div>

    <script src="index.js"></script>

</body>
</html>
